name: RentalX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: docker
          POSTGRES_PASSWORD: ignite
          POSTGRES_DB: rentx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: docker
      DB_PASSWORD: ignite
      DB_DATABASE: rentx
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET_TOKEN: ci-secret-token
      JWT_SECRET_REFRESH_TOKEN: ci-secret-refresh-token
      JWT_EXPIRES_IN_TOKEN: 15m
      JWT_EXPIRES_IN_REFRESH_TOKEN: 30d
      JWT_EXPIRES_REFRESH_TOKEN_DAYS: 30
      FORGOT_MAIL_URL: http://localhost:3333/password/reset?token=
      APP_API_URL: http://localhost:3333
      disk: local
      MAIL_PROVIDER: ethereal

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: psql -h localhost -U docker -d postgres -c "CREATE DATABASE rentx_test;"
        env:
          PGPASSWORD: ignite

      - name: Run migrations (main DB)
        run: NODE_ENV=development ./node_modules/.bin/typeorm-ts-node-commonjs migration:run -d ./src/config/data-source.ts

      - name: Run migrations (test DB)
        run: NODE_ENV=test ./node_modules/.bin/typeorm-ts-node-commonjs migration:run -d ./src/config/data-source.ts

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: NODE_ENV=test npx jest --runInBand --testPathIgnorePatterns='e2e.spec.ts' --config jest.config.ts

      - name: Run E2E tests
        run: NODE_ENV=test npx jest --runInBand --testPathPattern='e2e.spec.ts' --config jest.config.ts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
